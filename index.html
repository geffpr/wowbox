<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WowBox — Gift Experiences South Africa</title>
  <meta name="description" content="Curated gift experience boxes across South Africa. Adventure, wellness, food, spa & more." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🎁</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    /* =========================================================
       DESIGN TOKENS
    ========================================================= */
    :root {
      --forest:     #0b2419;
      --forest-mid: #163826;
      --forest-lt:  #1e5035;
      --gold:       #c8983a;
      --gold-lt:    #e2b75a;
      --champagne:  #e8d5a3;
      --ivory:      #faf8f2;
      --white:      #ffffff;
      --text:       #1c1c1c;
      --text-mid:   #3d3d3d;
      --muted:      #7a7567;
      --border:     #e0dbd0;
      --surface:    #ffffff;
      --shadow:     0 2px 20px rgba(11,36,25,.07);
      --shadow-md:  0 8px 40px rgba(11,36,25,.12);
      --shadow-lg:  0 20px 60px rgba(11,36,25,.18);
      --radius:     12px;
      --radius-lg:  20px;
      --trans:      .22s cubic-bezier(.4,0,.2,1);
      --font-head:  'Cormorant Garamond', Georgia, serif;
      --font-body:  'Plus Jakarta Sans', system-ui, sans-serif;
    }

    /* =========================================================
       RESET & BASE
    ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--ivory);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; }
    img { display: block; max-width: 100%; }
    input, textarea, select { font-family: var(--font-body); }

    /* =========================================================
       SCROLLBAR
    ========================================================= */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--ivory); }
    ::-webkit-scrollbar-thumb { background: var(--champagne); border-radius: 3px; }

    /* =========================================================
       NAV
    ========================================================= */
    #nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--forest);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 68px;
      box-shadow: 0 2px 20px rgba(0,0,0,.18);
    }
    .nav-brand {
      font-family: var(--font-head); font-size: 1.8rem; font-weight: 700;
      color: var(--gold); letter-spacing: .02em;
    }
    .nav-brand span { color: var(--champagne); }
    .nav-links {
      display: flex; align-items: center; gap: 2rem; list-style: none;
    }
    .nav-links a {
      color: rgba(255,255,255,.8); font-size: .88rem; font-weight: 500;
      letter-spacing: .04em; text-transform: uppercase;
      transition: color var(--trans);
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold-lt); }
    .nav-actions { display: flex; align-items: center; gap: .8rem; }
    .btn-nav {
      background: var(--gold); color: var(--forest);
      padding: .45rem 1.2rem; border-radius: 50px;
      font-size: .82rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      transition: background var(--trans), transform var(--trans);
    }
    .btn-nav:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .btn-nav-ghost {
      color: rgba(255,255,255,.7); font-size: .82rem; font-weight: 500;
      letter-spacing: .04em; text-transform: uppercase;
      transition: color var(--trans);
    }
    .btn-nav-ghost:hover { color: var(--white); }
    #user-badge {
      background: rgba(255,255,255,.12); color: var(--champagne);
      padding: .4rem 1rem; border-radius: 50px; font-size: .8rem; font-weight: 600;
      display: none;
    }
    .hamburger { display: none; background: none; border: none; color: white; font-size: 1.5rem; }

    /* =========================================================
       MAIN / ROUTER TARGET
    ========================================================= */
    #app { min-height: calc(100vh - 68px); }

    /* =========================================================
       HERO
    ========================================================= */
    .hero {
      min-height: 92vh;
      background: linear-gradient(145deg, var(--forest) 0%, #1a4a30 50%, #0d3020 100%);
      position: relative; overflow: hidden;
      display: flex; align-items: center;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E");
      opacity: .4; pointer-events: none;
    }
    .hero-circles {
      position: absolute; right: -5vw; top: 50%; transform: translateY(-50%);
      width: 60vw; height: 60vw; max-width: 700px; max-height: 700px;
      pointer-events: none;
    }
    .hero-circles::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,152,58,.12) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite;
    }
    .hero-circles::after {
      content: '';
      position: absolute; inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(200,152,58,.15);
      animation: pulse 6s ease-in-out infinite .5s;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.06);opacity:1} }
    .hero-content {
      position: relative; z-index: 1;
      padding: 8vw 5vw; max-width: 680px;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(200,152,58,.15); border: 1px solid rgba(200,152,58,.3);
      color: var(--gold-lt); padding: .4rem 1rem; border-radius: 50px;
      font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp .8s both;
    }
    .hero-title {
      font-family: var(--font-head); font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 600; color: var(--white); line-height: 1.07;
      margin-bottom: 1.5rem;
      animation: fadeUp .8s .15s both;
    }
    .hero-title em { color: var(--gold); font-style: italic; }
    .hero-sub {
      color: rgba(255,255,255,.65); font-size: 1.1rem; line-height: 1.7;
      max-width: 480px; margin-bottom: 2.5rem;
      animation: fadeUp .8s .3s both;
    }
    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      animation: fadeUp .8s .45s both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }

    .hero-stats {
      display: flex; gap: 3rem; margin-top: 4rem;
      animation: fadeUp .8s .6s both;
    }
    .hero-stat-val {
      font-family: var(--font-head); font-size: 2.2rem; font-weight: 700; color: var(--gold);
    }
    .hero-stat-label {
      font-size: .78rem; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .08em;
    }

    /* Marquee strip */
    .marquee-strip {
      background: var(--gold); overflow: hidden; padding: .6rem 0;
      white-space: nowrap;
    }
    .marquee-inner {
      display: inline-block; animation: marquee 30s linear infinite;
    }
    .marquee-inner span {
      font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: var(--forest); padding: 0 2.5rem;
    }
    .marquee-inner span::before { content: '✦ '; }
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

    /* =========================================================
       BUTTONS
    ========================================================= */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .85rem 2rem; border-radius: 50px;
      font-size: .9rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      transition: all var(--trans); cursor: pointer; border: none;
    }
    .btn-primary { background: var(--gold); color: var(--forest); }
    .btn-primary:hover { background: var(--gold-lt); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,152,58,.35); }
    .btn-outline {
      background: transparent; color: var(--white);
      border: 1.5px solid rgba(255,255,255,.35);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
    .btn-dark { background: var(--forest); color: var(--white); }
    .btn-dark:hover { background: var(--forest-lt); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(11,36,25,.3); }
    .btn-ghost {
      background: transparent; color: var(--forest);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--forest); background: var(--forest); color: var(--white); }
    .btn-sm { padding: .55rem 1.3rem; font-size: .8rem; }
    .btn-lg { padding: 1.1rem 2.6rem; font-size: 1rem; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: .5; pointer-events: none; }

    /* =========================================================
       SECTIONS
    ========================================================= */
    .section { padding: 6rem 5vw; }
    .section-sm { padding: 4rem 5vw; }
    .section-alt { background: var(--white); }
    .section-dark { background: var(--forest); }

    .section-eyebrow {
      font-size: .75rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .8rem;
    }
    .section-title {
      font-family: var(--font-head); font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600; line-height: 1.15; color: var(--text);
    }
    .section-title em { color: var(--forest-lt); font-style: italic; }
    .section-title.light { color: var(--white); }
    .section-sub { color: var(--muted); font-size: 1.05rem; line-height: 1.7; margin-top: .8rem; max-width: 520px; }
    .section-sub.light { color: rgba(255,255,255,.65); }
    .section-header { margin-bottom: 3rem; }
    .section-header-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 3rem; gap: 1.5rem; flex-wrap: wrap;
    }

    /* =========================================================
       CARDS — BOXES
    ========================================================= */
    .boxes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.8rem;
    }
    .box-card {
      background: var(--white); border-radius: var(--radius-lg);
      overflow: hidden; box-shadow: var(--shadow);
      transition: transform var(--trans), box-shadow var(--trans);
      cursor: pointer; position: relative;
    }
    .box-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
    .box-card-img {
      height: 220px; object-fit: cover; width: 100%;
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-lt) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .box-card-badge {
      position: absolute; top: 1rem; left: 1rem;
      background: var(--gold); color: var(--forest);
      padding: .25rem .8rem; border-radius: 50px;
      font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }
    .box-card-body { padding: 1.4rem; }
    .box-card-category {
      font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .5rem;
    }
    .box-card-name {
      font-family: var(--font-head); font-size: 1.4rem; font-weight: 600;
      color: var(--text); margin-bottom: .4rem; line-height: 1.2;
    }
    .box-card-desc { font-size: .88rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
    .box-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 1rem; margin-top: .5rem;
    }
    .box-card-price {
      font-family: var(--font-head); font-size: 1.6rem; font-weight: 700; color: var(--forest);
    }
    .box-card-price small { font-size: .9rem; font-weight: 400; color: var(--muted); }

    /* =========================================================
       HOW IT WORKS
    ========================================================= */
    .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2rem; }
    .step-card {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-lg); padding: 2rem; position: relative;
    }
    .step-num {
      font-family: var(--font-head); font-size: 4rem; font-weight: 700;
      color: rgba(200,152,58,.25); line-height: 1; margin-bottom: 1rem;
    }
    .step-icon { font-size: 2rem; margin-bottom: 1rem; }
    .step-title {
      font-family: var(--font-head); font-size: 1.3rem; font-weight: 600;
      color: var(--white); margin-bottom: .6rem;
    }
    .step-desc { font-size: .9rem; color: rgba(255,255,255,.55); line-height: 1.65; }

    /* =========================================================
       CATEGORIES FILTER
    ========================================================= */
    .filter-bar {
      display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 2rem;
    }
    .filter-chip {
      padding: .45rem 1.1rem; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: .8rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all var(--trans);
    }
    .filter-chip.active, .filter-chip:hover {
      border-color: var(--forest); background: var(--forest); color: var(--white);
    }

    /* =========================================================
       FORMS
    ========================================================= */
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; font-size: .82rem; font-weight: 600; color: var(--text-mid);
      margin-bottom: .4rem; letter-spacing: .02em;
    }
    .form-input {
      width: 100%; padding: .75rem 1rem; border-radius: var(--radius);
      border: 1.5px solid var(--border); background: var(--white);
      font-size: .95rem; color: var(--text);
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    .form-input:focus {
      outline: none; border-color: var(--forest);
      box-shadow: 0 0 0 3px rgba(11,36,25,.08);
    }
    .form-input::placeholder { color: #b0a898; }
    .form-select { appearance: none; cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 100px; }
    .form-hint { font-size: .78rem; color: var(--muted); margin-top: .3rem; }
    .form-error { font-size: .8rem; color: #c0392b; margin-top: .3rem; display: none; }

    /* =========================================================
       BOX DETAIL PAGE
    ========================================================= */
    .detail-hero {
      background: var(--forest);
      min-height: 380px; display: flex; align-items: center;
      font-size: 6rem; justify-content: center;
      position: relative;
    }
    .detail-container { padding: 4rem 5vw; max-width: 1100px; margin: 0 auto; }
    .detail-grid { display: grid; grid-template-columns: 1fr 380px; gap: 3.5rem; align-items: start; }
    .detail-title { font-family: var(--font-head); font-size: 2.6rem; font-weight: 700; margin-bottom: .5rem; }
    .detail-category { color: var(--gold); font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1rem; }
    .detail-desc { color: var(--text-mid); line-height: 1.8; margin-bottom: 2rem; font-size: 1.02rem; }
    .detail-features { list-style: none; margin-bottom: 2rem; }
    .detail-features li { padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .92rem; color: var(--text-mid); display: flex; gap: .7rem; align-items: center; }
    .detail-features li::before { content: '✓'; color: var(--forest-lt); font-weight: 700; }

    .purchase-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 2rem; position: sticky; top: 90px;
    }
    .purchase-price {
      font-family: var(--font-head); font-size: 2.8rem; font-weight: 700;
      color: var(--forest); margin-bottom: .2rem;
    }
    .purchase-hint { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }

    /* =========================================================
       CHECKOUT PAGE
    ========================================================= */
    .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 3rem; max-width: 960px; margin: 0 auto; }
    .order-summary-card {
      background: var(--forest); color: var(--white);
      border-radius: var(--radius-lg); padding: 2rem;
      position: sticky; top: 90px; height: fit-content;
    }
    .order-summary-title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
    .order-line { display: flex; justify-content: space-between; padding: .8rem 0; border-bottom: 1px solid rgba(255,255,255,.1); font-size: .9rem; }
    .order-total { display: flex; justify-content: space-between; padding-top: 1.2rem; font-weight: 700; font-size: 1.1rem; color: var(--gold-lt); }

    /* =========================================================
       SUCCESS PAGE
    ========================================================= */
    .success-page {
      min-height: 80vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 4rem 5vw;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1.5rem; animation: bounceIn .8s both; }
    @keyframes bounceIn { 0%{transform:scale(.3);opacity:0} 60%{transform:scale(1.1)} 80%{transform:scale(.95)} 100%{transform:scale(1);opacity:1} }
    .voucher-code {
      background: var(--forest); color: var(--gold-lt);
      font-family: 'Courier New', monospace; font-size: 1.8rem; font-weight: 700;
      letter-spacing: .2em; padding: 1.2rem 2.5rem; border-radius: var(--radius);
      border: 2px dashed rgba(200,152,58,.4); display: inline-block;
      margin: 1.5rem 0; cursor: pointer; user-select: all;
    }

    /* =========================================================
       MY VOUCHERS PAGE
    ========================================================= */
    .voucher-list { display: flex; flex-direction: column; gap: 1.2rem; }
    .voucher-item {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 1.5rem; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 1.5rem;
      border-left: 4px solid var(--border);
    }
    .voucher-item.active { border-left-color: var(--forest-lt); }
    .voucher-item.redeemed { border-left-color: var(--muted); opacity: .7; }
    .voucher-item.expired { border-left-color: #c0392b; opacity: .6; }
    .voucher-item-icon { font-size: 2rem; flex-shrink: 0; }
    .voucher-item-code { font-family: 'Courier New', monospace; font-size: 1rem; font-weight: 700; color: var(--forest); letter-spacing: .1em; }
    .voucher-status-badge {
      display: inline-block; padding: .2rem .7rem; border-radius: 50px;
      font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-redeemed { background: #e2e3e5; color: #383d41; }
    .badge-expired { background: #f8d7da; color: #721c24; }
    .badge-pending { background: #fff3cd; color: #856404; }

    /* =========================================================
       PARTNER PORTAL
    ========================================================= */
    .portal-layout { display: flex; min-height: calc(100vh - 68px); }
    .portal-sidebar {
      width: 260px; background: var(--forest); flex-shrink: 0;
      padding: 2rem 0; position: sticky; top: 68px; height: calc(100vh - 68px);
      overflow-y: auto;
    }
    .portal-sidebar-title {
      padding: 0 1.5rem 1.5rem; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.35);
    }
    .sidebar-nav { list-style: none; }
    .sidebar-nav li a {
      display: flex; align-items: center; gap: .8rem;
      padding: .75rem 1.5rem; color: rgba(255,255,255,.65);
      font-size: .88rem; font-weight: 500;
      transition: all var(--trans); border-left: 3px solid transparent;
    }
    .sidebar-nav li a:hover, .sidebar-nav li a.active {
      background: rgba(255,255,255,.08);
      color: var(--white); border-left-color: var(--gold);
    }
    .sidebar-nav li a .nav-icon { font-size: 1.1rem; }
    .portal-content { flex: 1; padding: 2.5rem; overflow-y: auto; background: var(--ivory); }

    /* =========================================================
       ADMIN / PORTAL STATS
    ========================================================= */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
    .stat-card {
      background: var(--white); border-radius: var(--radius); padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
    .stat-value { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--forest); }
    .stat-change { font-size: .78rem; color: var(--forest-lt); margin-top: .2rem; }

    /* =========================================================
       TABLE
    ========================================================= */
    .table-wrap { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      background: var(--forest); color: rgba(255,255,255,.8);
      padding: .8rem 1.2rem; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; text-align: left;
    }

/* ================================================================

const State = {

/* ================================================================
   UTILITIES
================================================================ */
function fmt(amount) {
  return `R ${Number(amount).toLocaleString('en-ZA', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
}

function fmtDate(d) {
  return d ? new Date(d).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric'}) : '—';
}

function slug(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function genCode(prefix = 'WOW') {
  return `${prefix}-${Math.random().toString(36).substring(2,7).toUpperCase()}-${Date.now().toString(36).toUpperCase()}`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', warning: '⚠' };
  const el = document.createElement('div');
  el.className = `toast ${type === 'success' ? '' : type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function setHTML(el, html) {
  if (typeof el === 'string') el = document.getElementById(el);
  if (el) el.innerHTML = html;
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
}

function toggleMobileNav() {
  const nav = document.getElementById('mobile-nav');
  nav.style.display = nav.style.display === 'none' ? 'flex' : 'none';
}

document.getElementById('hamburger-btn').addEventListener('click', toggleMobileNav);

/* ================================================================
   ROUTER
================================================================ */
function navigate(path, replace = false) {
  if (replace) history.replaceState({}, '', path);
  else history.pushState({}, '', path);
  route(path);
}

function route(path) {
  path = path || location.pathname;
  if (!path.startsWith('/')) path = '/' + path;

  // close mobile nav
  document.getElementById('mobile-nav').style.display = 'none';

  const app = document.getElementById('app');
  app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:40vh;font-size:2rem">⏳</div>';

  // update nav active state
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === path);
  });

  if (path === '/') return renderHome();
  if (path === '/shop') return renderShop();
  if (path.startsWith('/box/')) return renderBoxDetail(path.replace('/box/', ''));
  if (path === '/checkout') return renderCheckout();
  if (path === '/success') return renderSuccess();
  if (path === '/my-vouchers') return renderMyVouchers();
  if (path === '/partner') return renderPartnerPortal();
  if (path.startsWith('/partner/')) return renderPartnerPortal(path.replace('/partner/', ''));
  if (path === '/admin') return renderAdmin();
  if (path.startsWith('/admin/')) return renderAdmin(path.replace('/admin/', ''));

  // 404
  setHTML('app', `<div class="success-page"><div class="success-icon">🔍</div>
    <h2 style="font-family:var(--font-head);font-size:2.5rem">Page not found</h2>
    <p class="text-muted mt-2">The page you're looking for doesn't exist.</p>
    <a href="/" data-route="/" class="btn btn-dark mt-4">Go Home</a></div>`);
}

window.addEventListener('popstate', () => route(location.pathname));

/* ================================================================

================================================================ */
async function checkAuth() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    State.user = user;
    if (user) {
      const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
      State.profile = data;
      const badge = document.getElementById('user-badge');
      const name = document.getElementById('user-name-badge');
      badge.style.display = 'flex';
      name.textContent = data?.name || user.email;
    }
  } catch(e) { /* not authenticated */ }
}

async function logout() {
  await sb.auth.signOut();
  State.user = null; State.profile = null;
  document.getElementById('user-badge').style.display = 'none';
  toast('Logged out');
  navigate('/');
}

   SHOP PAGE
================================================================ */
async function renderShop() {
  setHTML('app', `
    <div class="page-header">
      <h1>Experience Boxes</h1>
      <p>Discover curated gift experiences across South Africa</p>

  window._allBoxes = [];

}

function filterShop(cat) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  const boxes = cat === 'all' ? window._allBoxes : (window._allBoxes || []).filter(b => b.category === cat);
  renderShopGrid(boxes);
}

function renderShopGrid(boxes) {
  const grid = document.getElementById('shop-grid');
  if (!grid) return;
  grid.innerHTML = (boxes && boxes.length) ? boxes.map(renderBoxCard).join('') : `<p class="text-muted" style="grid-column:1/-1;text-align:center;padding:3rem">No boxes in this category yet.</p>`;

/* ================================================================
   BOX CARD
================================================================ */
function renderBoxCard(box) {
  const emoji = categoryEmoji(box.category);
  return `
    <div class="box-card" onclick="navigate('/box/${esc(box.slug || box.id)}')">

      ${box.category ? `<div class="box-card-badge">${esc(box.category)}</div>` : ''}

        <div class="box-card-category">${esc(box.category || 'Experience')}</div>

async function initiatePayment() {
  const name    = document.getElementById('ch-name')?.value.trim();
  const email   = document.getElementById('ch-email')?.value.trim();
  const phone   = document.getElementById('ch-phone')?.value.trim();
  const message = document.getElementById('ch-message')?.value.trim();

  if (!name) { toast('Please enter the recipient\'s name', 'error'); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email', 'error'); return; }

  const { box } = State.cart;
  const btn = document.getElementById('pay-btn');
  btn.disabled = true; btn.textContent = 'Processing…';

  // Create pending order in Supabase
  let orderId, payRef;
  try {
    payRef = `WOW_${Date.now()}_${Math.random().toString(36).substring(2,8).toUpperCase()}`;
    const { data: order, error } = await sb.from('orders').insert({
      customer_name: name,
      customer_email: email,
      customer_phone: phone || null,
      gift_message: message || null,
      box_id: box.id,
      amount: box.price,
      currency: 'ZAR',
      payment_reference: payRef,
      payment_status: 'pending'
    }).select().single();

    if (error) throw error;
    orderId = order.id;
    State.pendingOrder = order;
  } catch(e) {
    toast('Could not create order. Please try again.', 'error');
    btn.disabled = false; btn.textContent = `Pay ${fmt(box.price)} →`;
    return;
  }

  // Paystack popup
  const handler = PaystackPop.setup({
    key: CFG.paystackKey,
    email: email,
    amount: box.price * 100, // kobo/cents
    currency: 'ZAR',
    ref: payRef,
    metadata: {
      custom_fields: [
        { display_name: 'Recipient', variable_name: 'recipient', value: name },
        { display_name: 'Box', variable_name: 'box', value: box.name },
        { display_name: 'Order ID', variable_name: 'order_id', value: orderId }
      ]
    },
    callback: async function(response) {
      await onPaymentSuccess(response, orderId, name, email, message, box);
    },
    onClose: function() {
      toast('Payment cancelled', 'warning');
      btn.disabled = false; btn.textContent = `Pay ${fmt(box.price)} →`;
    }
  });
  handler.openIframe();
}

async function onPaymentSuccess(response, orderId, name, email, message, box) {
  const ref = response.reference;
  try {
    // Verify with our API endpoint
    const verifyRes = await fetch('/api/verify-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reference: ref })
    });
    const verifyData = await verifyRes.json();

    const paid = verifyData.status === 'success' ||
                 (verifyData.data && verifyData.data.status === 'success') ||
                 response.status === 'success'; // fallback for test mode

    if (!paid) {
      toast('Payment verification failed. Please contact support.', 'error');
      return;
    }

    // Update order status
    await sb.from('orders').update({ payment_status: 'paid', payment_reference: ref })
      .eq('id', orderId);

    // Create voucher
    const code = genCode('WOW');
    await sb.from('vouchers').insert({
      code,
      order_id: orderId,
      box_id: box.id,
      status: 'active',
      expires_at: new Date(Date.now() + 365*24*60*60*1000).toISOString()
    });

    // Send email via our API
    try {
      await fetch('/api/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to: email,
          type: 'voucher',
          data: { name, code, box, message: message || '' }
        })
      });
    } catch(e) { console.warn('Email send failed:', e); }

    State.successData = { code, email, name, box, ref };
    navigate('/success');
  } catch(e) {
    toast('Payment recorded but voucher creation failed. Contact support@wowbox.co.za', 'error');
  }
}

async function partnerLogin() {
  const email = document.getElementById('pl-email')?.value.trim();
  const pass  = document.getElementById('pl-pass')?.value;
  if (!email || !pass) { toast('Enter email and password', 'error'); return; }
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    State.user = data.user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
    State.profile = profile;
    if (profile?.role !== 'partner' && profile?.role !== 'admin') {
      await sb.auth.signOut();
      toast('Not a partner account', 'error'); return;
    }
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('user-name-badge').textContent = profile?.name || email;
    toast('Welcome back!');
    if (profile.role === 'admin') navigate('/admin');
    else navigate('/partner');
  } catch(e) {
    toast(e.message || 'Login failed', 'error');
  }
}

function switchAdminTab(tab) {
  State.adminTab = tab;
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  loadAdminTab(tab);
}

async function loadAdminTab(tab) {
  const main = document.getElementById('admin-main');
  if (!main) return;
  if (tab === 'dashboard')   await renderAdminDashboard(main);
  else if (tab === 'boxes')       await renderAdminBoxes(main);
  else if (tab === 'experiences') await renderAdminExperiences(main);
  else if (tab === 'orders')      await renderAdminOrders(main);
  else if (tab === 'vouchers')    await renderAdminVouchers(main);
  else if (tab === 'partners')    await renderAdminPartners(main);
}

async function createPartner() {
  const name  = document.getElementById('pt-name')?.value.trim();
  const biz   = document.getElementById('pt-biz')?.value.trim();
  const email = document.getElementById('pt-email')?.value.trim();
  const pass  = document.getElementById('pt-pass')?.value;
  if (!name || !biz || !email || !pass) { toast('All fields required', 'error'); return; }
  try {
    // Create user via Admin API (needs service role) — here we use signUp for simplicity
    // In production, use the Admin API via a serverless function
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) throw error;
    // Create profile
    await sb.from('profiles').insert({ id: data.user.id, name, business_name: biz, role: 'partner' });
    closeModal(); toast('Partner account created!');
    await renderAdminPartners(document.getElementById('admin-main'));
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function removePartner(id) {
  await sb.from('profiles').delete().eq('id', id);
  toast('Partner removed');
  await renderAdminPartners(document.getElementById('admin-main'));
}

function renderAdminLogin() {
  setHTML('app', `
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">Wow<span>Box</span></div>
        <p class="login-subtitle">Admin Panel Login</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="al-email" type="email" placeholder="admin@wowbox.co.za" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="al-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()" />
        </div>
        <button class="btn btn-dark btn-full mt-2" onclick="adminLogin()">Login as Admin</button>
        <p class="text-center text-small text-muted mt-3">First time? Create your admin account in Supabase Auth, then set role='admin' in the profiles table.</p>
      </div>
    </div>
  `);
}

async function adminLogin() {
  const email = document.getElementById('al-email')?.value.trim();
  const pass  = document.getElementById('al-pass')?.value;
  if (!email || !pass) { toast('Enter email and password', 'error'); return; }
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    State.user = data.user;
    const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
    State.profile = profile;
    if (profile?.role !== 'admin') {
      await sb.auth.signOut();
      toast('Not an admin account', 'error'); return;
    }
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('user-name-badge').textContent = profile?.name || 'Admin';
    toast('Welcome, Admin!');
    navigate('/admin');
  } catch(e) {
    toast(e.message || 'Login failed', 'error');
  }
}
